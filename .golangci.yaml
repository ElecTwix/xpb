# golangci-lint configuration (toy project - lenient)
# Run with: golangci-lint run ./...

version: "2"

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - benchmarks
    - node_modules
    - dist

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused

formatters:
  enable:
    - gofmt
    - goimports

issues:
  presets:
    - bugs
    - unused

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - govet
          - staticcheck
          - unused

      - path: _test\.go
        linters:
          - depguard
          - wsl
          - cyclop
          - funcorder
          - godot
          - lll
          - mnd
          - nestif
          - nlreturn
          - testpackage

  max-issues-per-linter: 50
  max-same-issues: 3
