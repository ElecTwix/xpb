<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XPB V2 Worker Benchmark</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { 
      text-align: center;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h2 { color: #ffd93d; margin-top: 2rem; }
    .info {
      background: rgba(100, 100, 255, 0.2);
      border: 1px solid #88f;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
      margin: 1rem 0;
    }
    th, td {
      padding: 1rem;
      text-align: right;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    th { background: rgba(255, 217, 61, 0.2); text-align: left; }
    td:first-child { text-align: left; font-weight: bold; }
    .highlight { color: #ffd93d; font-weight: bold; }
    .success { color: #0f8; }
    .warning { color: #fa0; }
    #status {
      text-align: center;
      padding: 2rem;
      font-size: 1.2rem;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #ffd93d;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .summary {
      background: rgba(255, 217, 61, 0.1);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin: 1rem 0;
    }
    pre { background: #111; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    code { color: #0ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ XPB V2 Worker Benchmark</h1>
    <div class="info">
      <p><strong>Web Worker Decoding</strong> - Test decoding large XPB payloads in a separate thread.</p>
      <p>This is useful for avoiding main thread blocking when decoding payloads &gt;10KB.</p>
    </div>
    <div id="status"><span class="spinner"></span>Initializing workers...</div>
    <div id="results"></div>
  </div>

  <script type="module">
    import './dist/xpb-browser.js';
    import { XPBWorkerPool } from './dist/xpb-worker-pool.js';
    
    const { Encoder, Decoder, FieldType, compileEncoder, compileDecoder, SlabAllocator } = window.XPB;
    const results = document.getElementById('results');
    const status = document.getElementById('status');
    
    // Generate test data of various sizes
    function generateLargeStringArray(count) {
      const arr = [];
      for (let i = 0; i < count; i++) {
        arr.push(`item_${String.fromCharCode(65 + (i % 26))}_value_${i}_padding`);
      }
      return arr;
    }
    
    function generateLargeIntArray(count) {
      const arr = [];
      for (let i = 0; i < count; i++) {
        arr.push(i * 17);
      }
      return arr;
    }
    
    // Encode test data
    function encodeStringArray(arr) {
      const encoder = new Encoder(arr.length * 30);
      encoder.writeInt32(arr.length);
      for (const s of arr) {
        encoder.writeString(s);
      }
      return encoder.finish();
    }
    
    function encodeInt32Array(arr) {
      const encoder = new Encoder(arr.length * 4 + 4);
      encoder.writeInt32(arr.length);
      for (const v of arr) {
        encoder.writeInt32(v);
      }
      return encoder.finish();
    }
    
    // Synchronous decode (main thread)
    function decodeStringArraySync(data) {
      const decoder = new Decoder(data);
      const count = decoder.readInt32();
      const result = [];
      for (let i = 0; i < count; i++) {
        result.push(decoder.readString());
      }
      return result;
    }
    
    function decodeInt32ArraySync(data) {
      const decoder = new Decoder(data);
      const count = decoder.readInt32();
      const result = [];
      for (let i = 0; i < count; i++) {
        result.push(decoder.readInt32());
      }
      return result;
    }
    
    // Benchmark utilities
    async function benchSync(name, iterations, fn) {
      // Warmup
      for (let i = 0; i < 10; i++) fn();
      
      const start = performance.now();
      for (let i = 0; i < iterations; i++) {
        fn();
      }
      const end = performance.now();
      
      return (end - start) / iterations;
    }
    
    async function benchAsync(name, iterations, fn) {
      // Warmup
      for (let i = 0; i < 5; i++) await fn();
      
      const start = performance.now();
      for (let i = 0; i < iterations; i++) {
        await fn();
      }
      const end = performance.now();
      
      return (end - start) / iterations;
    }
    
    // Encode test data (JSON)
    function encodeJSONStringArray(arr) {
      const str = JSON.stringify(arr);
      return new TextEncoder().encode(str);
    }

    // Decode test data (JSON)
    function decodeJSONStringArray(data) {
      const str = new TextDecoder().decode(data);
      return JSON.parse(str);
    }

    // ... (existing encoding functions)

    // Run benchmarks
    async function runBenchmarks() {
      status.textContent = 'Initializing worker pools...';
      
      // Initialize worker pools
      const poolNaive = new XPBWorkerPool(4);
      await poolNaive.init('./dist/xpb-worker.js');

      const poolOpt = new XPBWorkerPool(4);
      await poolOpt.init('./dist/xpb-worker-optimized.js');
      
      status.textContent = 'Running benchmarks...';
      
      const testSizes = [
        { name: 'Small (100 items)', count: 100, iterations: 100 },
        { name: 'Medium (1K items)', count: 1000, iterations: 50 },
        { name: 'Large (10K items)', count: 10000, iterations: 10 },
        { name: 'XLarge (50K items)', count: 50000, iterations: 3 },
      ];
      
      let html = '';
      const allResults = {
          stringArray: [],
          int32Array: []
      };
      
      // String Array benchmarks
      html += '<h2>📦 String Array Decode: XPB Worker vs JSON</h2>';
      html += '<table><tr><th>Size</th><th>XPB Size</th><th>JSON Size</th><th>XPB Worker</th><th>JSON Parse</th><th>Winner</th></tr>';
      
      for (const { name, count, iterations } of testSizes) {
        const data = generateLargeStringArray(count);
        
        // XPB Prep
        const xpbEncoded = encodeStringArray(data);
        const xpbSize = (xpbEncoded.length / 1024).toFixed(1) + ' KB';
        
        // JSON Prep
        const jsonEncoded = encodeJSONStringArray(data);
        const jsonSize = (jsonEncoded.length / 1024).toFixed(1) + ' KB';
        
        // XPB Worker benchmark
        const xpbTime = await benchAsync('xpb-worker', iterations, async () => {
          const buffer = xpbEncoded.buffer.slice(0);
          await poolOpt.decodeStringArrayAsync(buffer);
        });

        // JSON benchmark (Main Thread)
        // JSON.parse is blocking, but it's the standard.
        // We include TextDecoder time because XPB handles binary->string.
        const jsonTime = await benchSync('json', iterations, () => {
           decodeJSONStringArray(jsonEncoded);
        });
        
        const speedup = jsonTime / xpbTime;
        const winner = xpbTime < jsonTime ? `<strong>XPB (${speedup.toFixed(2)}x)</strong>` : `JSON (${(jsonTime/xpbTime).toFixed(2)}x)`;
        
        allResults.stringArray.push({
            name, 
            payloadSize: xpbSize, // reusing field name for compat
            jsonSize,
            xpbTime, 
            jsonTime, 
            speedup
        });

        html += `<tr>
          <td>${name}</td>
          <td>${xpbSize}</td>
          <td>${jsonSize}</td>
          <td class="highlight">${xpbTime.toFixed(2)} ms</td>
          <td>${jsonTime.toFixed(2)} ms</td>
          <td>${winner}</td>
        </tr>`;
      }
      
      html += '</table>';
      
      results.innerHTML = html;
      status.style.display = 'none';

      window.workerBenchmarkResults = allResults;
      
      poolNaive.terminate();
      poolOpt.terminate();
    }
    
    runBenchmarks().catch(e => {
      console.error(e);
      status.innerHTML = `<span style="color: #f44">Error: ${e.message}</span>`;
    });
  </script>
</body>
</html>
