<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XPB V2 Browser Benchmark</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: #eee;
        min-height: 100vh;
        margin: 0;
        padding: 2rem;
      }
      h1 {
        text-align: center;
        background: linear-gradient(90deg, #00d2ff, #3a7bd5);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 2rem;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        overflow: hidden;
        margin: 1rem 0;
      }
      th,
      td {
        padding: 1rem;
        text-align: right;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      th {
        background: rgba(0, 210, 255, 0.2);
        text-align: left;
      }
      td:first-child {
        text-align: left;
        font-weight: bold;
      }
      .highlight {
        color: #00d2ff;
        font-weight: bold;
      }
      #status {
        text-align: center;
        padding: 2rem;
        font-size: 1.2rem;
        color: #888;
      }
      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #00d2ff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 10px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>⚡ XPB V2 Browser Benchmark</h1>
      <div id="status"><span class="spinner"></span>Running benchmarks...</div>
      <div id="results"></div>
    </div>

    <script type="module">
      // Import the bundled XPB browser runtime (built to same directory)
      import './dist/xpb-browser.js';

      const {
        Encoder,
        Decoder,
        SlabAllocator,
        compileEncoder,
        compileDecoder,
        FieldType,
      } = window.XPB;

      // Test data
      const smallUser = { name: "Alice Johnson", age: 30, active: true };
      const userSchema = {
        fields: [
          { tag: 1, type: FieldType.String, name: "name" },
          { tag: 2, type: FieldType.Int32, name: "age" },
          { tag: 3, type: FieldType.Bool, name: "active" },
        ],
      };

      // Benchmark function
      function bench(name, iterations, fn) {
        // Warmup
        for (let i = 0; i < 1000; i++) fn();

        const start = performance.now();
        for (let i = 0; i < iterations; i++) fn();
        const end = performance.now();

        return ((end - start) * 1_000_000) / iterations;
      }

      async function runBenchmarks() {
        const iterations = 100000;
        const results = [];

        // XPB JIT Benchmark
        const jitEncode = compileEncoder(userSchema);
        const jitDecode = compileDecoder(userSchema);
        const slab = new SlabAllocator(65536);

        slab.pos = 0;
        jitEncode(slab, smallUser);
        const encoded = new Uint8Array(slab.buf.subarray(0, slab.pos));

        const xpbEncodeNs = bench("XPB encode", iterations, () => {
          slab.pos = 0;
          jitEncode(slab, smallUser);
        });

        const xpbDecodeNs = bench("XPB decode", iterations, () => {
          jitDecode(encoded, encoded.length);
        });

        results.push({
          name: "XPB V2 (JIT)",
          encodeNs: xpbEncodeNs,
          decodeNs: xpbDecodeNs,
          sizeBytes: encoded.length,
        });

        // XPB Manual Benchmark
        const manualEncoder = new Encoder(64);
        const manualEncodeNs = bench("XPB Manual encode", iterations, () => {
          manualEncoder.reset();
          manualEncoder.writeString(smallUser.name);
          manualEncoder.writeInt32(smallUser.age);
          manualEncoder.writeBool(smallUser.active);
          manualEncoder.finish();
        });

        manualEncoder.reset();
        manualEncoder.writeString(smallUser.name);
        manualEncoder.writeInt32(smallUser.age);
        manualEncoder.writeBool(smallUser.active);
        const manualEncoded = manualEncoder.finish();

        const manualDecodeNs = bench("XPB Manual decode", iterations, () => {
          const dec = new Decoder(manualEncoded);
          dec.readString();
          dec.readInt32();
          dec.readBool();
        });

        results.push({
          name: "XPB V2 (Manual)",
          encodeNs: manualEncodeNs,
          decodeNs: manualDecodeNs,
          sizeBytes: manualEncoded.length,
        });

        // JSON Benchmark
        let jsonEncoded = "";
        const jsonEncodeNs = bench("JSON encode", iterations, () => {
          jsonEncoded = JSON.stringify(smallUser);
        });

        const jsonDecodeNs = bench("JSON decode", iterations, () => {
          JSON.parse(jsonEncoded);
        });

        results.push({
          name: "JSON",
          encodeNs: jsonEncodeNs,
          decodeNs: jsonDecodeNs,
          sizeBytes: jsonEncoded.length,
        });

        return results;
      }

      function displayResults(results) {
        let html = `
        <table>
          <tr>
            <th>Format</th>
            <th>Encode</th>
            <th>Decode</th>
            <th>Size</th>
          </tr>
      `;

        for (const r of results) {
          const isXPB = r.name.includes("XPB");
          html += `
          <tr>
            <td>${r.name}</td>
            <td class="${isXPB ? "highlight" : ""}">${r.encodeNs.toFixed(0)} ns</td>
            <td class="${isXPB ? "highlight" : ""}">${r.decodeNs.toFixed(0)} ns</td>
            <td>${r.sizeBytes} B</td>
          </tr>
        `;
        }

        html += `</table>`;

        // Summary
        const xpb = results.find((r) => r.name.includes("JIT"));
        const json = results.find((r) => r.name === "JSON");
        if (xpb && json) {
          html += `
          <p>📊 <strong>Summary:</strong></p>
          <p>XPB vs JSON Encode: <span class="highlight">${(json.encodeNs / xpb.encodeNs).toFixed(2)}x faster</span></p>
          <p>XPB vs JSON Decode: <span class="highlight">${(json.decodeNs / xpb.decodeNs).toFixed(2)}x faster</span></p>
          <p>XPB vs JSON Size: <span class="highlight">${(json.sizeBytes / xpb.sizeBytes).toFixed(1)}x smaller</span></p>
        `;
        }

        document.getElementById("results").innerHTML = html;
        document.getElementById("status").style.display = "none";

        // Expose results for Playwright
        window.benchmarkResults = results;
      }

      // Run on load
      runBenchmarks().then(displayResults);
    </script>
  </body>
</html>
