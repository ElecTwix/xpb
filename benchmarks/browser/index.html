<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XPB V2 Browser Benchmark</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: #eee;
        min-height: 100vh;
        margin: 0;
        padding: 2rem;
      }
      h1 {
        text-align: center;
        background: linear-gradient(90deg, #00d2ff, #3a7bd5);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 2rem;
      }
      h2 {
        color: #00d2ff;
        margin-top: 2rem;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        overflow: hidden;
        margin: 1rem 0;
      }
      th,
      td {
        padding: 1rem;
        text-align: right;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      th {
        background: rgba(0, 210, 255, 0.2);
        text-align: left;
      }
      td:first-child {
        text-align: left;
        font-weight: bold;
      }
      .highlight {
        color: #00d2ff;
        font-weight: bold;
      }
      #status {
        text-align: center;
        padding: 2rem;
        font-size: 1.2rem;
        color: #888;
      }
      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #00d2ff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 10px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .summary {
        background: rgba(0, 210, 255, 0.1);
        border-radius: 12px;
        padding: 1rem 1.5rem;
        margin: 1rem 0;
      }
      .summary p {
        margin: 0.5rem 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>⚡ XPB V2 Browser Benchmark</h1>
      <div id="status"><span class="spinner"></span>Running benchmarks...</div>
      <div id="results"></div>
    </div>

    <script type="module">
      // Import the bundled XPB browser runtime
      import './dist/xpb-browser.js';
      // Import MessagePack
      import { encode as msgpackEncode, decode as msgpackDecode } from './dist/msgpack.js';

      const {
        Encoder,
        Decoder,
        SlabAllocator,
        compileEncoder,
        compileDecoder,
        FieldType,
      } = window.XPB;

      // ============= Test Data =============
      
      // Small message (3 fields) - matches Go/Node.js benchmarks
      const smallUser = { name: "Alice Johnson", age: 30, active: true };
      const smallUserSchema = {
        fields: [
          { tag: 1, type: FieldType.String, name: "name" },
          { tag: 2, type: FieldType.Int32, name: "age" },
          { tag: 3, type: FieldType.Bool, name: "active" },
        ],
      };

      // Large message (7 fields) - matches Go/Node.js LargeBenchUser
      const largeUser = {
        id: 12345678901234n,  // BigInt for uint64
        name: "Alice Johnson",
        email: "alice.johnson@example.com",
        age: 30,
        score: 95.5,
        active: true,
        description: "This is a longer description field that contains more text."
      };
      const largeUserSchema = {
        fields: [
          { tag: 1, type: FieldType.Uint64, name: "id" },
          { tag: 2, type: FieldType.String, name: "name" },
          { tag: 3, type: FieldType.String, name: "email" },
          { tag: 4, type: FieldType.Int32, name: "age" },
          { tag: 5, type: FieldType.Float64, name: "score" },
          { tag: 6, type: FieldType.Bool, name: "active" },
          { tag: 7, type: FieldType.String, name: "description" },
        ],
      };

      // For JSON/Msgpack, we need a version with Number instead of BigInt
      const largeUserJSON = {
        id: 12345678901234,
        name: "Alice Johnson",
        email: "alice.johnson@example.com",
        age: 30,
        score: 95.5,
        active: true,
        description: "This is a longer description field that contains more text."
      };

      // ============= Collection Test Data =============
      
      function generateStringArray(size) {
        const arr = [];
        for (let i = 0; i < size; i++) {
          arr.push(`item_${String.fromCharCode(65 + (i % 26))}_value`);
        }
        return arr;
      }
      
      function generateInt32Array(size) {
        const arr = [];
        for (let i = 0; i < size; i++) {
          arr.push(i * 17);
        }
        return arr;
      }
      
      function generateStringMap(size) {
        const m = {};
        for (let i = 0; i < size; i++) {
          const key = `key_${String.fromCharCode(65 + (i % 26))}_${i % 10}`;
          m[key] = `value_for_${key}`;
        }
        return m;
      }

      // ============= Benchmark Utilities =============
      
      function bench(name, iterations, fn) {
        // Warmup
        for (let i = 0; i < 1000; i++) fn();

        const start = performance.now();
        for (let i = 0; i < iterations; i++) fn();
        const end = performance.now();

        return ((end - start) * 1_000_000) / iterations;
      }

      function benchMultiple(name, iterations, fn, rounds = 5) {
        const results = [];
        for (let r = 0; r < rounds; r++) {
          results.push(bench(name, iterations, fn));
        }
        results.sort((a, b) => a - b);
        return {
          min: results[0],
          avg: results.reduce((a, b) => a + b, 0) / results.length,
          max: results[results.length - 1]
        };
      }

      // ============= XPB Benchmarks =============
      
      function benchXPB_JIT(schema, data, iterations) {
        const jitEncode = compileEncoder(schema);
        const jitDecode = compileDecoder(schema);
        const slab = new SlabAllocator(65536);

        slab.pos = 0;
        jitEncode(slab, data);
        const encoded = new Uint8Array(slab.buf.subarray(0, slab.pos));

        const encodeResult = benchMultiple("XPB JIT encode", iterations, () => {
          slab.pos = 0;
          jitEncode(slab, data);
        });

        const decodeResult = benchMultiple("XPB JIT decode", iterations, () => {
          jitDecode(encoded, encoded.length);
        });

        return {
          name: "XPB V2 (JIT)",
          encodeNs: encodeResult.min,
          decodeNs: decodeResult.min,
          sizeBytes: encoded.length,
        };
      }

      function benchJSON(data, iterations) {
        let jsonEncoded = "";
        const encodeResult = benchMultiple("JSON encode", iterations, () => {
          jsonEncoded = JSON.stringify(data);
        });

        const decodeResult = benchMultiple("JSON decode", iterations, () => {
          JSON.parse(jsonEncoded);
        });

        return {
          name: "JSON",
          encodeNs: encodeResult.min,
          decodeNs: decodeResult.min,
          sizeBytes: jsonEncoded.length,
        };
      }

      function benchMsgpack(data, iterations) {
        let msgpackEncoded = new Uint8Array(0);
        const encodeResult = benchMultiple("Msgpack encode", iterations, () => {
          msgpackEncoded = msgpackEncode(data);
        });

        const decodeResult = benchMultiple("Msgpack decode", iterations, () => {
          msgpackDecode(msgpackEncoded);
        });

        return {
          name: "Msgpack",
          encodeNs: encodeResult.min,
          decodeNs: decodeResult.min,
          sizeBytes: msgpackEncoded.length,
        };
      }

      // ============= Collection Benchmarks =============
      
      function benchXPB_StringArray(arr, iterations) {
        const encoder = new Encoder(arr.length * 20);
        
        const encodeXPB = () => {
          encoder.reset();
          encoder.writeInt32(arr.length);
          for (const s of arr) {
            encoder.writeString(s);
          }
          return encoder.finish();
        };
        
        const encoded = encodeXPB();
        const size = encoded.length;
        
        const decodeXPB = (data) => {
          const dec = new Decoder(data);
          const count = dec.readInt32();
          const result = [];
          for (let i = 0; i < count; i++) {
            result.push(dec.readString());
          }
          return result;
        };
        
        const encResult = benchMultiple("XPB encode", iterations, encodeXPB);
        const decResult = benchMultiple("XPB decode", iterations, () => decodeXPB(encoded));
        return { name: "XPB V2", encodeNs: encResult.min, decodeNs: decResult.min, sizeBytes: size };
      }
      
      function benchXPB_Int32Array(arr, iterations) {
        const encoder = new Encoder(arr.length * 4 + 4);
        
        const encodeXPB = () => {
          encoder.reset();
          encoder.writeInt32(arr.length);
          for (const v of arr) {
            encoder.writeInt32(v);
          }
          return encoder.finish();
        };
        
        const encoded = encodeXPB();
        const size = encoded.length;
        
        const decodeXPB = (data) => {
          const dec = new Decoder(data);
          const count = dec.readInt32();
          const result = [];
          for (let i = 0; i < count; i++) {
            result.push(dec.readInt32());
          }
          return result;
        };
        
        const encResult = benchMultiple("XPB encode", iterations, encodeXPB);
        const decResult = benchMultiple("XPB decode", iterations, () => decodeXPB(encoded));
        return { name: "XPB V2", encodeNs: encResult.min, decodeNs: decResult.min, sizeBytes: size };
      }
      
      function benchXPB_StringMap(map, iterations) {
        const entries = Object.entries(map);
        const encoder = new Encoder(entries.length * 40);
        
        const encodeXPB = () => {
          encoder.reset();
          encoder.writeInt32(entries.length);
          for (const [k, v] of entries) {
            encoder.writeString(k);
            encoder.writeString(v);
          }
          return encoder.finish();
        };
        
        const encoded = encodeXPB();
        const size = encoded.length;
        
        const decodeXPB = (data) => {
          const dec = new Decoder(data);
          const count = dec.readInt32();
          const result = {};
          for (let i = 0; i < count; i++) {
            const k = dec.readString();
            const v = dec.readString();
            result[k] = v;
          }
          return result;
        };
        
        const encResult = benchMultiple("XPB encode", iterations, encodeXPB);
        const decResult = benchMultiple("XPB decode", iterations, () => decodeXPB(encoded));
        return { name: "XPB V2", encodeNs: encResult.min, decodeNs: decResult.min, sizeBytes: size };
      }

      // ============= Run Benchmarks =============
      
      async function runBenchmarks() {
        const iterations = 100000;
        const collIterations = 10000;
        
        const allResults = {
          small: [],
          large: [],
          stringArray: [],
          intArray: [],
          stringMap: [],
          sizeScaling: []
        };

        // Small message benchmarks
        allResults.small.push(benchXPB_JIT(smallUserSchema, smallUser, iterations));
        allResults.small.push(benchJSON(smallUser, iterations));
        allResults.small.push(benchMsgpack(smallUser, iterations));

        // Large message benchmarks
        allResults.large.push(benchXPB_JIT(largeUserSchema, largeUser, iterations));
        allResults.large.push(benchJSON(largeUserJSON, iterations));
        allResults.large.push(benchMsgpack(largeUserJSON, iterations));

        // Collection benchmarks (100 elements)
        const strArr = generateStringArray(100);
        const intArr = generateInt32Array(100);
        const strMap = generateStringMap(100);
        
        // String Array
        allResults.stringArray.push(benchXPB_StringArray(strArr, collIterations));
        allResults.stringArray.push(benchJSON(strArr, collIterations));
        allResults.stringArray.push(benchMsgpack(strArr, collIterations));
        
        // Int32 Array
        allResults.intArray.push(benchXPB_Int32Array(intArr, collIterations));
        allResults.intArray.push(benchJSON(intArr, collIterations));
        allResults.intArray.push(benchMsgpack(intArr, collIterations));
        
        // String Map
        allResults.stringMap.push(benchXPB_StringMap(strMap, collIterations));
        allResults.stringMap.push(benchJSON(strMap, collIterations));
        allResults.stringMap.push(benchMsgpack(strMap, collIterations));

        // Size scaling data
        allResults.sizeScaling = [
          { name: "Tiny (1 bool)", xpb: 1, json: 11, savings: "90.9%" },
          { name: "Small (3 fields)", xpb: 19, json: 47, savings: "59.6%" },
          { name: "Large (7 fields)", xpb: 121, json: 192, savings: "37.0%" },
        ];

        return allResults;
      }

      // ============= Display Results =============
      
      function formatTable(results) {
        let html = `
        <table>
          <tr>
            <th>Format</th>
            <th>Encode</th>
            <th>Decode</th>
            <th>Size</th>
          </tr>
        `;

        for (const r of results) {
          const isXPB = r.name.includes("XPB");
          html += `
          <tr>
            <td>${r.name}</td>
            <td class="${isXPB ? "highlight" : ""}">${r.encodeNs.toFixed(0)} ns</td>
            <td class="${isXPB ? "highlight" : ""}">${r.decodeNs.toFixed(0)} ns</td>
            <td>${r.sizeBytes} B</td>
          </tr>
          `;
        }

        html += `</table>`;
        return html;
      }

      function formatSizeScaling(data) {
        let html = `
        <table>
          <tr>
            <th>Message Size</th>
            <th>XPB (B)</th>
            <th>JSON (B)</th>
            <th>Savings</th>
          </tr>
        `;
        
        for (const row of data) {
          html += `
          <tr>
            <td>${row.name}</td>
            <td class="highlight">${row.xpb}</td>
            <td>${row.json}</td>
            <td class="highlight">${row.savings}</td>
          </tr>
          `;
        }
        
        html += `</table>`;
        return html;
      }

      function formatSummary(label, xpb, json, msgpack) {
        if (!xpb || !json) return '';
        
        let html = `<div class="summary">`;
        html += `<p><strong>📊 ${label} Summary:</strong></p>`;
        html += `<p>XPB vs JSON Encode: <span class="highlight">${(json.encodeNs / xpb.encodeNs).toFixed(2)}x faster</span></p>`;
        html += `<p>XPB vs JSON Decode: <span class="highlight">${(json.decodeNs / xpb.decodeNs).toFixed(2)}x faster</span></p>`;
        html += `<p>XPB vs JSON Size: <span class="highlight">${(json.sizeBytes / xpb.sizeBytes).toFixed(1)}x smaller</span></p>`;
        
        if (msgpack) {
          html += `<p>XPB vs Msgpack Encode: <span class="highlight">${(msgpack.encodeNs / xpb.encodeNs).toFixed(2)}x faster</span></p>`;
          html += `<p>XPB vs Msgpack Decode: <span class="highlight">${(msgpack.decodeNs / xpb.decodeNs).toFixed(2)}x faster</span></p>`;
        }
        
        html += `</div>`;
        return html;
      }

      function displayResults(allResults) {
        let html = '';
        
        // Small message results
        html += `<h2>📦 Small Message (3 fields: name, age, active)</h2>`;
        html += formatTable(allResults.small);
        
        const xpbSmall = allResults.small.find(r => r.name.includes("XPB"));
        const jsonSmall = allResults.small.find(r => r.name === "JSON");
        const msgpackSmall = allResults.small.find(r => r.name === "Msgpack");
        html += formatSummary("Small Message", xpbSmall, jsonSmall, msgpackSmall);
        
        // Large message results
        html += `<h2>📦 Large Message (7 fields)</h2>`;
        html += formatTable(allResults.large);
        
        const xpbLarge = allResults.large.find(r => r.name.includes("XPB"));
        const jsonLarge = allResults.large.find(r => r.name === "JSON");
        const msgpackLarge = allResults.large.find(r => r.name === "Msgpack");
        html += formatSummary("Large Message", xpbLarge, jsonLarge, msgpackLarge);

        // String Array results
        html += `<h2>📦 String Array (100 elements)</h2>`;
        html += formatTable(allResults.stringArray);
        const xpbStrArr = allResults.stringArray.find(r => r.name.includes("XPB"));
        const jsonStrArr = allResults.stringArray.find(r => r.name === "JSON");
        html += formatSummary("String Array", xpbStrArr, jsonStrArr, null);
        
        // Int32 Array results
        html += `<h2>📦 Int32 Array (100 elements)</h2>`;
        html += formatTable(allResults.intArray);
        const xpbIntArr = allResults.intArray.find(r => r.name.includes("XPB"));
        const jsonIntArr = allResults.intArray.find(r => r.name === "JSON");
        html += formatSummary("Int32 Array", xpbIntArr, jsonIntArr, null);
        
        // String Map results
        html += `<h2>📦 String Map (100 entries)</h2>`;
        html += formatTable(allResults.stringMap);
        const xpbStrMap = allResults.stringMap.find(r => r.name.includes("XPB"));
        const jsonStrMap = allResults.stringMap.find(r => r.name === "JSON");
        html += formatSummary("String Map", xpbStrMap, jsonStrMap, null);
        
        // Size Scaling
        html += `<h2>📊 Size Scaling (XPB vs JSON)</h2>`;
        html += formatSizeScaling(allResults.sizeScaling);
        html += `<div class="summary">
          <p><strong>📈 Key Insight:</strong> XPB provides greatest size savings for smaller messages</p>
          <p>- Tiny messages: ~91% smaller than JSON</p>
          <p>- Small messages: ~60% smaller than JSON</p>
          <p>- Large messages: ~37% smaller than JSON</p>
        </div>`;

        document.getElementById("results").innerHTML = html;
        document.getElementById("status").style.display = "none";

        // Expose results for Playwright
        window.benchmarkResults = allResults;
      }

      // Run on load
      runBenchmarks().then(displayResults);
    </script>
  </body>
</html>
