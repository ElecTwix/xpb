<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XPB V2 Browser Benchmark</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: #eee;
        min-height: 100vh;
        margin: 0;
        padding: 2rem;
      }
      h1 {
        text-align: center;
        background: linear-gradient(90deg, #00d2ff, #3a7bd5);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 2rem;
      }
      h2 {
        color: #00d2ff;
        margin-top: 2rem;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        overflow: hidden;
        margin: 1rem 0;
      }
      th,
      td {
        padding: 1rem;
        text-align: right;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      th {
        background: rgba(0, 210, 255, 0.2);
        text-align: left;
      }
      td:first-child {
        text-align: left;
        font-weight: bold;
      }
      .highlight {
        color: #00d2ff;
        font-weight: bold;
      }
      #status {
        text-align: center;
        padding: 2rem;
        font-size: 1.2rem;
        color: #888;
      }
      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #00d2ff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 10px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .summary {
        background: rgba(0, 210, 255, 0.1);
        border-radius: 12px;
        padding: 1rem 1.5rem;
        margin: 1rem 0;
      }
      .summary p {
        margin: 0.5rem 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>⚡ XPB V2 Browser Benchmark</h1>
      <div id="status"><span class="spinner"></span>Running benchmarks...</div>
      <div id="results"></div>
    </div>

    <script type="module">
      // Import the bundled XPB browser runtime
      import './dist/xpb-browser.js';
      // Import MessagePack
      import { encode as msgpackEncode, decode as msgpackDecode } from './dist/msgpack.js';

      const {
        Encoder,
        Decoder,
        SlabAllocator,
        compileEncoder,
        compileDecoder,
        FieldType,
      } = window.XPB;

      // ============= Test Data =============
      
      // Small message (3 fields) - matches Go/Node.js benchmarks
      const smallUser = { name: "Alice Johnson", age: 30, active: true };
      const smallUserSchema = {
        fields: [
          { tag: 1, type: FieldType.String, name: "name" },
          { tag: 2, type: FieldType.Int32, name: "age" },
          { tag: 3, type: FieldType.Bool, name: "active" },
        ],
      };

      // Large message (7 fields) - matches Go/Node.js LargeBenchUser
      const largeUser = {
        id: 12345678901234n,  // BigInt for uint64
        name: "Alice Johnson",
        email: "alice.johnson@example.com",
        age: 30,
        score: 95.5,
        active: true,
        description: "This is a longer description field that contains more text."
      };
      const largeUserSchema = {
        fields: [
          { tag: 1, type: FieldType.Uint64, name: "id" },
          { tag: 2, type: FieldType.String, name: "name" },
          { tag: 3, type: FieldType.String, name: "email" },
          { tag: 4, type: FieldType.Int32, name: "age" },
          { tag: 5, type: FieldType.Float64, name: "score" },
          { tag: 6, type: FieldType.Bool, name: "active" },
          { tag: 7, type: FieldType.String, name: "description" },
        ],
      };

      // For JSON/Msgpack, we need a version with Number instead of BigInt
      const largeUserJSON = {
        id: 12345678901234,
        name: "Alice Johnson",
        email: "alice.johnson@example.com",
        age: 30,
        score: 95.5,
        active: true,
        description: "This is a longer description field that contains more text."
      };

      // ============= Benchmark Utilities =============
      
      function bench(name, iterations, fn) {
        // Warmup
        for (let i = 0; i < 1000; i++) fn();

        const start = performance.now();
        for (let i = 0; i < iterations; i++) fn();
        const end = performance.now();

        return ((end - start) * 1_000_000) / iterations;
      }

      function benchMultiple(name, iterations, fn, rounds = 5) {
        const results = [];
        for (let r = 0; r < rounds; r++) {
          results.push(bench(name, iterations, fn));
        }
        results.sort((a, b) => a - b);
        return {
          min: results[0],
          avg: results.reduce((a, b) => a + b, 0) / results.length,
          max: results[results.length - 1]
        };
      }

      // ============= XPB Benchmarks =============
      
      function benchXPB_JIT(schema, data, iterations) {
        const jitEncode = compileEncoder(schema);
        const jitDecode = compileDecoder(schema);
        const slab = new SlabAllocator(65536);

        slab.pos = 0;
        jitEncode(slab, data);
        const encoded = new Uint8Array(slab.buf.subarray(0, slab.pos));

        const encodeResult = benchMultiple("XPB JIT encode", iterations, () => {
          slab.pos = 0;
          jitEncode(slab, data);
        });

        const decodeResult = benchMultiple("XPB JIT decode", iterations, () => {
          jitDecode(encoded, encoded.length);
        });

        return {
          name: "XPB V2 (JIT)",
          encodeNs: encodeResult.min,
          decodeNs: decodeResult.min,
          sizeBytes: encoded.length,
        };
      }

      function benchJSON(data, iterations) {
        let jsonEncoded = "";
        const encodeResult = benchMultiple("JSON encode", iterations, () => {
          jsonEncoded = JSON.stringify(data);
        });

        const decodeResult = benchMultiple("JSON decode", iterations, () => {
          JSON.parse(jsonEncoded);
        });

        return {
          name: "JSON",
          encodeNs: encodeResult.min,
          decodeNs: decodeResult.min,
          sizeBytes: jsonEncoded.length,
        };
      }

      function benchMsgpack(data, iterations) {
        let msgpackEncoded = new Uint8Array(0);
        const encodeResult = benchMultiple("Msgpack encode", iterations, () => {
          msgpackEncoded = msgpackEncode(data);
        });

        const decodeResult = benchMultiple("Msgpack decode", iterations, () => {
          msgpackDecode(msgpackEncoded);
        });

        return {
          name: "Msgpack",
          encodeNs: encodeResult.min,
          decodeNs: decodeResult.min,
          sizeBytes: msgpackEncoded.length,
        };
      }

      // ============= Run Benchmarks =============
      
      async function runBenchmarks() {
        const iterations = 100000;
        const rounds = 5;
        
        const allResults = {
          small: [],
          large: []
        };

        // Small message benchmarks
        allResults.small.push(benchXPB_JIT(smallUserSchema, smallUser, iterations));
        allResults.small.push(benchJSON(smallUser, iterations));
        allResults.small.push(benchMsgpack(smallUser, iterations));

        // Large message benchmarks
        allResults.large.push(benchXPB_JIT(largeUserSchema, largeUser, iterations));
        allResults.large.push(benchJSON(largeUserJSON, iterations));
        allResults.large.push(benchMsgpack(largeUserJSON, iterations));

        return allResults;
      }

      // ============= Display Results =============
      
      function formatTable(results) {
        let html = `
        <table>
          <tr>
            <th>Format</th>
            <th>Encode</th>
            <th>Decode</th>
            <th>Size</th>
          </tr>
        `;

        for (const r of results) {
          const isXPB = r.name.includes("XPB");
          html += `
          <tr>
            <td>${r.name}</td>
            <td class="${isXPB ? "highlight" : ""}">${r.encodeNs.toFixed(0)} ns</td>
            <td class="${isXPB ? "highlight" : ""}">${r.decodeNs.toFixed(0)} ns</td>
            <td>${r.sizeBytes} B</td>
          </tr>
          `;
        }

        html += `</table>`;
        return html;
      }

      function formatSummary(label, xpb, json, msgpack) {
        if (!xpb || !json) return '';
        
        let html = `<div class="summary">`;
        html += `<p><strong>📊 ${label} Summary:</strong></p>`;
        html += `<p>XPB vs JSON Encode: <span class="highlight">${(json.encodeNs / xpb.encodeNs).toFixed(2)}x faster</span></p>`;
        html += `<p>XPB vs JSON Decode: <span class="highlight">${(json.decodeNs / xpb.decodeNs).toFixed(2)}x faster</span></p>`;
        html += `<p>XPB vs JSON Size: <span class="highlight">${(json.sizeBytes / xpb.sizeBytes).toFixed(1)}x smaller</span></p>`;
        
        if (msgpack) {
          html += `<p>XPB vs Msgpack Encode: <span class="highlight">${(msgpack.encodeNs / xpb.encodeNs).toFixed(2)}x faster</span></p>`;
          html += `<p>XPB vs Msgpack Decode: <span class="highlight">${(msgpack.decodeNs / xpb.decodeNs).toFixed(2)}x faster</span></p>`;
        }
        
        html += `</div>`;
        return html;
      }

      function displayResults(allResults) {
        let html = '';
        
        // Small message results
        html += `<h2>📦 Small Message (3 fields: name, age, active)</h2>`;
        html += formatTable(allResults.small);
        
        const xpbSmall = allResults.small.find(r => r.name.includes("XPB"));
        const jsonSmall = allResults.small.find(r => r.name === "JSON");
        const msgpackSmall = allResults.small.find(r => r.name === "Msgpack");
        html += formatSummary("Small Message", xpbSmall, jsonSmall, msgpackSmall);
        
        // Large message results
        html += `<h2>📦 Large Message (7 fields: id, name, email, age, score, active, description)</h2>`;
        html += formatTable(allResults.large);
        
        const xpbLarge = allResults.large.find(r => r.name.includes("XPB"));
        const jsonLarge = allResults.large.find(r => r.name === "JSON");
        const msgpackLarge = allResults.large.find(r => r.name === "Msgpack");
        html += formatSummary("Large Message", xpbLarge, jsonLarge, msgpackLarge);

        document.getElementById("results").innerHTML = html;
        document.getElementById("status").style.display = "none";

        // Expose results for Playwright
        window.benchmarkResults = {
          small: allResults.small,
          large: allResults.large
        };
      }

      // Run on load
      runBenchmarks().then(displayResults);
    </script>
  </body>
</html>
