<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS String Builtins Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #00d2ff; }
    .result { 
      padding: 1rem; 
      border-radius: 8px; 
      margin: 1rem 0;
    }
    .success { background: rgba(0, 255, 100, 0.2); border: 1px solid #0f8; }
    .error { background: rgba(255, 100, 100, 0.2); border: 1px solid #f88; }
    .info { background: rgba(100, 100, 255, 0.2); border: 1px solid #88f; }
    pre { background: #111; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    code { color: #0ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 WebAssembly JS String Builtins Test</h1>
    <p>Testing support for <code>wasm:js-string</code> builtins (Chrome 131+)</p>
    
    <div id="results"></div>
    <div id="benchmark"></div>
  </div>

  <script type="module">
    const results = document.getElementById('results');
    const benchmark = document.getElementById('benchmark');
    
    function log(message, type = 'info') {
      const div = document.createElement('div');
      div.className = `result ${type}`;
      div.innerHTML = message;
      results.appendChild(div);
    }
    
    // Test 1: Check if builtinModules option is supported
    async function testBuiltinModulesSupport() {
      log('<strong>Test 1:</strong> Checking builtinModules option support...');
      
      try {
        // Minimal valid WASM module (just magic number and version)
        const minimalModule = new Uint8Array([
          0x00, 0x61, 0x73, 0x6d, // magic: \0asm
          0x01, 0x00, 0x00, 0x00, // version: 1
        ]);
        
        // Try to compile with builtinModules option
        const module = await WebAssembly.compile(minimalModule, {
          builtinModules: ['js-string']
        });
        
        log('✅ builtinModules option is supported!', 'success');
        return true;
      } catch (e) {
        log(`❌ builtinModules not supported: ${e.message}`, 'error');
        return false;
      }
    }
    
    // Test 2: Create a WASM module that actually uses fromCharCodeArray
    async function testFromCharCodeArray() {
      log('<strong>Test 2:</strong> Testing fromCharCodeArray import...');
      
      try {
        // Pre-compiled WASM bytes from wabt (with reference_types and gc enabled)
        // This module imports fromCharCodeArray and exports makeString
        const wasmBytes = new Uint8Array([0, 97, 115, 109, 1, 0, 0, 0, 1, 14, 2, 96, 3, 127, 127, 127, 1, 111, 96, 2, 127, 127, 1, 111, 2, 36, 1, 14, 119, 97, 115, 109, 58, 106, 115, 45, 115, 116, 114, 105, 110, 103, 17, 102, 114, 111, 109, 67, 104, 97, 114, 67, 111, 100, 101, 65, 114, 114, 97, 121, 0, 0, 3, 2, 1, 1, 5, 3, 1, 0, 1, 7, 23, 2, 6, 109, 101, 109, 111, 114, 121, 2, 0, 10, 109, 97, 107, 101, 83, 116, 114, 105, 110, 103, 0, 1, 10, 12, 1, 10, 0, 32, 0, 32, 1, 65, 0, 16, 0, 11]);
        
        // Compile with builtins enabled
        const module = await WebAssembly.compile(wasmBytes, {
          builtinModules: ['js-string']
        });
        
        // Instantiate - need empty import object when using builtins
        const instance = await WebAssembly.instantiate(module, {});
        
        // Get memory and function
        const memory = instance.exports.memory;
        const makeString = instance.exports.makeString;
        
        // Write "Hello" to memory as i16 (WTF-16)
        const memView = new Uint16Array(memory.buffer);
        const testStr = "Hello, World!";
        for (let i = 0; i < testStr.length; i++) {
          memView[i] = testStr.charCodeAt(i);
        }
        
        // Call makeString
        const result = makeString(0, testStr.length);
        
        if (result === testStr) {
          log(`✅ fromCharCodeArray works! Created string: "${result}"`, 'success');
          return { memory, makeString };
        } else {
          log(`⚠️ String mismatch. Expected "${testStr}", got "${result}"`, 'error');
          return null;
        }
      } catch (e) {
        log(`❌ fromCharCodeArray test failed: ${e.message}`, 'error');
        console.error(e);
        return null;
      }
    }
    
    // Test 3: Benchmark string creation
    async function runBenchmark(wasm) {
      log('<strong>Test 3:</strong> Running string decode benchmark...');
      
      if (!wasm) {
        log('⚠️ Skipping benchmark - WASM not available', 'info');
        return;
      }
      
      const { memory, makeString } = wasm;
      const memView = new Uint16Array(memory.buffer);
      
      // Test string lengths
      const testCases = [
        { name: "Short (8 chars)", str: "12345678" },
        { name: "Medium (32 chars)", str: "A".repeat(32) },
        { name: "Long (128 chars)", str: "B".repeat(128) },
      ];
      
      const iterations = 100000;
      const textDecoder = new TextDecoder();
      
      let html = '<h2>📊 Benchmark Results</h2><table style="width:100%"><tr><th>Test</th><th>WASM Builtin</th><th>TextDecoder</th><th>Speedup</th></tr>';
      
      for (const tc of testCases) {
        // Write string as i16
        for (let i = 0; i < tc.str.length; i++) {
          memView[i] = tc.str.charCodeAt(i);
        }
        
        // Also create i8 version for TextDecoder
        const bytes = new TextEncoder().encode(tc.str);
        
        // Benchmark WASM
        const wasmStart = performance.now();
        for (let i = 0; i < iterations; i++) {
          makeString(0, tc.str.length);
        }
        const wasmTime = performance.now() - wasmStart;
        
        // Benchmark TextDecoder
        const tdStart = performance.now();
        for (let i = 0; i < iterations; i++) {
          textDecoder.decode(bytes);
        }
        const tdTime = performance.now() - tdStart;
        
        const speedup = tdTime / wasmTime;
        const wasmNs = (wasmTime * 1000000 / iterations).toFixed(0);
        const tdNs = (tdTime * 1000000 / iterations).toFixed(0);
        
        html += `<tr>
          <td>${tc.name}</td>
          <td>${wasmNs} ns</td>
          <td>${tdNs} ns</td>
          <td style="color: ${speedup > 1 ? '#0f8' : '#f88'}">${speedup.toFixed(2)}x</td>
        </tr>`;
      }
      
      html += '</table>';
      benchmark.innerHTML = html;
    }
    
    // Run all tests
    async function main() {
      log(`<strong>Browser:</strong> ${navigator.userAgent}`, 'info');
      
      const supported = await testBuiltinModulesSupport();
      if (!supported) {
        log('⚠️ JS String Builtins not supported. Requires Chrome 131+ or compatible browser.', 'error');
        return;
      }
      
      const wasm = await testFromCharCodeArray();
      await runBenchmark(wasm);
    }
    
    main();
  </script>
</body>
</html>
